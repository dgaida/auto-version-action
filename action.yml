name: 'Auto Version and Badges'
description: 'Increments version in pyproject.toml, creates a git tag, and adds badges to README.md'
author: 'Daniel Gaida'
inputs:
  github-token:
    description: 'GitHub token for authentication'
    required: false
    default: ${{ github.token }}
  auto-version:
    description: 'Whether to automatically increment the version'
    required: false
    default: 'true'
  create-badge:
    description: 'Whether to automatically add/update badges'
    required: false
    default: 'true'

  md-list-fix:
    description: "Whether to automatically fix Markdown lists"
    required: false
    default: "true"

  run-on-push:
    description: 'Whether to run on push events (outside of PRs)'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Increment version
      if: (github.event_name != 'push' || inputs.run-on-push == 'true') && inputs.auto-version == 'true'
      run: python ${{ github.action_path }}/auto-version/increment_version.py
      shell: bash


    - name: Fix Markdown lists
      if: (github.event_name != "push" || inputs.run-on-push == "true") && inputs.md-list-fix == "true"
      run: python ${{ github.action_path }}/md-list-fixer/fix_md_lists.py
      shell: bash

    - name: Run add_badges script
      if: (github.event_name != 'push' || inputs.run-on-push == 'true') && inputs.create-badge == 'true'
      run: python ${{ github.action_path }}/add_badges.py
      shell: bash
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Commit and push changes
      if: github.event_name != 'push' || inputs.run-on-push == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        if [ -f "pyproject.toml" ]; then
          git add pyproject.toml
        fi
        if [ -f "README.md" ]; then
          git add "*.md"
        fi

        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "chore: auto version and badges [skip ci]"
          git push

          if [ "${{ inputs.auto-version }}" == "true" ] && [ -f "pyproject.toml" ]; then
            NEW_VERSION=$(grep '^version = "' pyproject.toml | cut -d'"' -f2)
            if [ -n "$NEW_VERSION" ]; then
              if ! git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
                git tag v$NEW_VERSION
                git push origin v$NEW_VERSION
              else
                echo "Tag v$NEW_VERSION already exists"
              fi
            fi
          fi
        else
          echo "No changes to commit"
        fi
      shell: bash
