name: "Markdown List Fixer"
description: "Ensures Markdown list items end with two spaces for proper line breaks"
author: "Daniel Gaida"
inputs:
  run-on-push:
    description: "Whether to run on push events (outside of PRs)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Fix Markdown lists
      if: github.event_name != 'push' || inputs.run-on-push == 'true'
      run: python ${{ github.action_path }}/fix_md_lists.py
      shell: bash

    - name: Commit and push changes
      if: github.event_name != 'push' || inputs.run-on-push == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # Add all changed markdown files
        git add "*.md"

        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "chore: fix markdown list formatting [skip ci]"
          git pull --rebase origin ${{ github.event.pull_request.base.ref || github.ref_name }}
          git push origin ${{ github.event.pull_request.base.ref || github.ref_name }}
        else
          echo "No markdown files changed"
        fi
      shell: bash
